<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Blog Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <h1>Page title</h1>
    </header>

    <div class="container">
        <main class="content">
            <article>
                <h2>Heading</h2>
                <p class="meta">Date | Author</p>
                
                <div class="video-container">
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ?si=hNpZvth1IoDW1B26&amp;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>

                <p>Text content</p>
                <p>Text content 2</p>
            </article>
        </main>

        <aside class="sidebar">
            <div class="ad-box">
                <p>ADS</p>
                <img src=".//ad1.png" alt="Advertisement">
            </div>
            
            <div class="ad-box">
                <p>ADS</p>
                <img src="./ad2.jpg" alt="Advertisement">
            </div>
        </aside>
    </div>

</body>
</html>
